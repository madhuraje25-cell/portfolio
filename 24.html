<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #020617;
    }

    header h1 {
      font-size: 2.5rem;
    }

    header p {
      color: #94a3b8;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      margin: 0 10px;
      color: #38bdf8;
      text-decoration: none;
    }

    section {
      padding: 50px;
      text-align: center;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      margin-top: 20px;
    }

    a.btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #38bdf8;
      color: black;
      border-radius: 5px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h1>Madhura Raje</h1>
  <p>Web Developer | Student | Designer</p>

  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="about">
  <h2>About Me</h2>
  <p>I am a passionate developer who builds websites and apps.</p>
</section>

<section id="projects">
  <h2>My Projects</h2>

  <div class="projects">
    <div class="card">
      <h3>Project 1</h3>
          </div>

    <div class="card">
      <h3>Project 2</h3>
      
    </div>

    <div class="card">
      <h3>Project 3</h3>
      
    </div>
  </div>
</section>

<section id="contact">
  <h2>Contact Me</h2>
  <p>Email: madhuraje25@email.com</p>
  <a href="#" class="btn">Download Resume</a>
</section>

<footer>
  <p>© 2026 Your Name</p>
</footer>

</body>
</html>
